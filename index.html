<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iWallet Pro</title>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card-bg: #1c1c1e;
            --ios-blue: #0a84ff;
            --ios-green: #30d158;
            --ios-red: #ff453a;
            --ios-gray: #8e8e93;
            --ios-text: #ffffff;
            --glass: rgba(28, 28, 30, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background-color: var(--ios-bg); color: var(--ios-text); margin: 0; padding: 0; overflow: hidden; height: 100vh; }

        /* --- Header --- */
        header { padding: 60px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 34px; font-weight: 700; margin: 0; }
        .add-btn { font-size: 28px; color: var(--ios-blue); cursor: pointer; }

        /* --- Main Content --- */
        main { height: calc(100vh - 180px); overflow-y: auto; padding: 10px 20px; }

        /* --- Card Swiper --- */
        .card-container {
            display: flex; gap: 15px; overflow-x: auto; scroll-snap-type: x mandatory;
            padding: 10px 0 25px; scrollbar-width: none;
        }
        .card-container::-webkit-scrollbar { display: none; }

        .card {
            min-width: 85vw; height: 200px; border-radius: 18px; padding: 20px;
            scroll-snap-align: center; display: flex; flex-direction: column;
            justify-content: space-between; transition: transform 0.2s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-name { font-size: 18px; font-weight: 600; opacity: 0.9; }
        .card-balance { font-size: 28px; font-weight: 700; }
        .card-footer { display: flex; justify-content: space-between; font-family: monospace; opacity: 0.8; }

        /* --- Actions --- */
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .btn {
            background: var(--ios-card-bg); border: none; color: var(--ios-blue);
            padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* --- Transaction List --- */
        .tx-list { margin-top: 20px; }
        .tx-item {
            background: var(--ios-card-bg); padding: 12px 15px; border-radius: 14px;
            display: flex; align-items: center; margin-bottom: 8px;
        }
        .tx-icon { width: 40px; height: 40px; border-radius: 10px; background: #2c2c2e; 
                   display: flex; align-items: center; justify-content: center; margin-right: 12px; }
        .tx-info { flex: 1; }
        .tx-title { font-weight: 600; font-size: 15px; }
        .tx-subtitle { font-size: 12px; color: var(--ios-gray); }
        .tx-amt { font-weight: 700; }
        .tx-amt.neg { color: #fff; }
        .tx-amt.pos { color: var(--ios-green); }

        /* --- Modal --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column;
            padding: 60px 20px; z-index: 100;
        }
        .modal.active { display: flex; }
        .modal input {
            background: #2c2c2e; border: none; border-radius: 10px; padding: 15px;
            color: #fff; font-size: 17px; margin-bottom: 15px; width: 100%;
        }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 30px; }
        .cancel { color: var(--ios-blue); }
        .save { font-weight: 700; color: var(--ios-blue); }

        nav {
            position: fixed; bottom: 0; width: 100%; height: 85px;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding-top: 10px; border-top: 0.5px solid #38383a;
        }
    </style>
</head>
<body>

<header>
    <h1>Wallet</h1>
    <div class="add-btn" onclick="openModal('card')">+</div>
</header>

<main>
    <div class="card-container" id="cardList">
        <!-- Cards injected here -->
    </div>

    <div class="actions">
        <button class="btn" onclick="openModal('send')"><span>↑</span> Send</button>
        <button class="btn" onclick="alert('QR Scanner would open')"><span>📷</span> Scan</button>
    </div>

    <div class="tx-list" id="txList">
        <h3 style="font-size: 20px; margin-bottom: 15px;">Activity</h3>
        <!-- Transactions injected here -->
    </div>
</main>

<!-- Add Card Modal -->
<div id="cardModal" class="modal">
    <div class="modal-header">
        <span class="cancel" onclick="closeModals()">Cancel</span>
        <span class="save" onclick="addCard()">Add Card</span>
    </div>
    <input type="text" id="cardLabel" placeholder="Bank Name (e.g. Chase)">
    <input type="number" id="cardInitBalance" placeholder="Initial Balance ($)">
    <input type="color" id="cardColor" value="#0a84ff" style="height: 50px;">
</div>

<!-- Send Money Modal -->
<div id="sendModal" class="modal">
    <div class="modal-header">
        <span class="cancel" onclick="closeModals()">Cancel</span>
        <span class="save" onclick="sendMoney()">Send</span>
    </div>
    <input type="text" id="sendTo" placeholder="To: Name or @username">
    <input type="number" id="sendAmount" placeholder="Amount ($)">
</div>

<nav>
    <div style="color: var(--ios-blue); text-align:center;"><i>💳</i><br><small>Wallet</small></div>
    <div style="color: var(--ios-gray); text-align:center;"><i>🕒</i><br><small>History</small></div>
</nav>

<script>
    // State Management
    let data = JSON.parse(localStorage.getItem('walletData')) || {
        cards: [],
        transactions: []
    };

    function save() {
        localStorage.setItem('walletData', JSON.stringify(data));
        render();
    }

    function openModal(type) {
        document.getElementById(type + 'Modal').classList.add('active');
    }

    function closeModals() {
        document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
    }

    function addCard() {
        const name = document.getElementById('cardLabel').value;
        const bal = parseFloat(document.getElementById('cardInitBalance').value);
        const color = document.getElementById('cardColor').value;

        if (!name || isNaN(bal)) return;

        data.cards.push({ id: Date.now(), name, balance: bal, color });
        save();
        closeModals();
    }

    function sendMoney() {
        const to = document.getElementById('sendTo').value;
        const amt = parseFloat(document.getElementById('sendAmount').value);

        if (data.cards.length === 0) { alert("Add a card first!"); return; }
        if (!to || isNaN(amt)) return;

        // Deduct from the first card (active card logic)
        data.cards[0].balance -= amt;
        data.transactions.unshift({
            id: Date.now(),
            title: `To: ${to}`,
            amt: -amt,
            date: 'Just now'
        });

        save();
        closeModals();
    }

    function render() {
        const cardList = document.getElementById('cardList');
        const txList = document.getElementById('txList');

        // Render Cards
        cardList.innerHTML = data.cards.length ? '' : '<p style="color:gray">No cards added. Tap + to start.</p>';
        data.cards.forEach(card => {
            cardList.innerHTML += `
                <div class="card" style="background: ${card.color}">
                    <div class="card-name">${card.name}</div>
                    <div class="card-balance">$${card.balance.toLocaleString()}</div>
                    <div class="card-footer">
                        <span>•••• 4242</span>
                        <span>VISA</span>
                    </div>
                </div>
            `;
        });

        // Render Transactions
        txList.innerHTML = '<h3 style="font-size: 20px; margin-bottom: 15px;">Activity</h3>';
        data.transactions.forEach(tx => {
            txList.innerHTML += `
                <div class="tx-item">
                    <div class="tx-icon">${tx.amt > 0 ? '💰' : '💸'}</div>
                    <div class="tx-info">
                        <div class="tx-title">${tx.title}</div>
                        <div class="tx-subtitle">${tx.date}</div>
                    </div>
                    <div class="tx-amt ${tx.amt > 0 ? 'pos' : 'neg'}">
                        ${tx.amt > 0 ? '+' : ''}$${Math.abs(tx.amt).toFixed(2)}
                    </div>
                </div>
            `;
        });
    }

    // Initial Render
    render();
</script>
</body>
</html>
