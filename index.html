<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iWallet</title>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card-bg: #1c1c1e;
            --ios-blue: #0a84ff;
            --ios-green: #30d158;
            --ios-gray: #8e8e93;
            --ios-text: #ffffff;
            --glass: rgba(28, 28, 30, 0.7);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--ios-bg);
            color: var(--ios-text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Header --- */
        header {
            padding: 60px 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 34px;
            font-weight: 700;
            margin: 0;
        }

        .profile-pic {
            width: 40px;
            height: 40px;
            background: linear-gradient(45deg, #ff9f0a, #ff375f);
            border-radius: 50%;
        }

        /* --- Main Content --- */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 100px; /* Space for bottom nav */
        }

        /* --- Credit Card --- */
        .card-carousel {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding-bottom: 20px;
        }

        .card-carousel::-webkit-scrollbar { display: none; }

        .card {
            min-width: 85vw;
            height: 200px;
            background: linear-gradient(135deg, #2c3e50, #000000);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            scroll-snap-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card.apple-card {
            background: radial-gradient(circle at top left, #fff, #e5e5e5);
            color: #000;
        }

        .card-vendor { font-weight: 600; font-size: 18px; }
        .card-number { font-family: monospace; font-size: 20px; letter-spacing: 2px; }
        .card-balance { font-size: 24px; font-weight: 700; }

        /* --- Quick Actions --- */
        .actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--ios-gray);
        }

        .icon-circle {
            width: 50px;
            height: 50px;
            background-color: var(--ios-card-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--ios-blue);
        }

        /* --- Transaction List --- */
        .transactions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .transactions-header h2 { font-size: 20px; margin: 0; }
        .see-all { color: var(--ios-blue); font-size: 15px; }

        .transaction-item {
            background-color: var(--ios-card-bg);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .tx-icon {
            width: 45px;
            height: 45px;
            background: #3a3a3c;
            border-radius: 12px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .tx-info { flex: 1; }
        .tx-name { font-weight: 600; font-size: 16px; margin-bottom: 2px; }
        .tx-date { color: var(--ios-gray); font-size: 13px; }
        .tx-amount { font-weight: 700; font-size: 16px; }
        .tx-amount.neg { color: #fff; }
        .tx-amount.pos { color: var(--ios-green); }

        /* --- Bottom Navigation --- */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 85px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding-top: 10px;
            border-top: 0.5px solid #38383a;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--ios-gray);
            font-size: 10px;
            gap: 4px;
        }

        .nav-item.active { color: var(--ios-blue); }
        .nav-item i { font-size: 24px; }

    </style>
</head>
<body>

    <header>
        <h1>Wallet</h1>
        <div class="profile-pic"></div>
    </header>

    <main>
        <!-- Cards -->
        <div class="card-carousel">
            <div class="card apple-card">
                <div class="card-vendor">Apple Card</div>
                <div class="card-balance">$2,450.00</div>
                <div class="card-number">•••• 8821</div>
            </div>
            <div class="card" style="background: linear-gradient(135deg, #622774, #c53364);">
                <div class="card-vendor">Visa Platinum</div>
                <div class="card-balance">$12,102.50</div>
                <div class="card-number">•••• 4490</div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="actions">
            <div class="action-btn">
                <div class="icon-circle">↑</div>
                <span>Send</span>
            </div>
            <div class="action-btn">
                <div class="icon-circle">↓</div>
                <span>Receive</span>
            </div>
            <div class="action-btn">
                <div class="icon-circle">⌘</div>
                <span>Pay</span>
            </div>
            <div class="action-btn">
                <div class="icon-circle">⋯</div>
                <span>More</span>
            </div>
        </div>

        <!-- Transactions -->
        <div class="transactions-header">
            <h2>Latest Activity</h2>
            <span class="see-all">See All</span>
        </div>

        <div id="transaction-list">
            <!-- Item 1 -->
            <div class="transaction-item">
                <div class="tx-icon">☕️</div>
                <div class="tx-info">
                    <div class="tx-name">Starbucks</div>
                    <div class="tx-date">Today, 9:41 AM</div>
                </div>
                <div class="tx-amount neg">-$5.40</div>
            </div>
            <!-- Item 2 -->
            <div class="transaction-item">
                <div class="tx-icon">🍏</div>
                <div class="tx-info">
                    <div class="tx-name">Apple Music</div>
                    <div class="tx-date">Yesterday</div>
                </div>
                <div class="tx-amount neg">-$10.99</div>
            </div>
            <!-- Item 3 -->
            <div class="transaction-item">
                <div class="tx-icon">💰</div>
                <div class="tx-info">
                    <div class="tx-name">Salary Deposit</div>
                    <div class="tx-date">Oct 28</div>
                </div>
                <div class="tx-amount pos">+$3,200.00</div>
            </div>
        </div>
    </main>

    <nav>
        <div class="nav-item active">
            <i>💳</i>
            <span>Wallet</span>
        </div>
        <div class="nav-item">
            <i>📊</i>
            <span>Activity</span>
        </div>
        <div class="nav-item">
            <i>⚙️</i>
            <span>Settings</span>
        </div>
    </nav>

    <script>
        // Simple haptic-like feedback on buttons
        const buttons = document.querySelectorAll('.action-btn, .transaction-item, .nav-item');
        
        buttons.forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.style.opacity = '0.6';
                btn.style.transform = 'scale(0.96)';
                btn.style.transition = 'all 0.1s ease';
            });
            btn.addEventListener('touchend', () => {
                btn.style.opacity = '1';
                btn.style.transform = 'scale(1)';
            });
        });

        // Toggle Active Nav
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            });
        });
    </script>
</body>
</html>
